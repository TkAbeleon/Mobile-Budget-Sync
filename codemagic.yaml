workflows:
  android-release:
    name: BudgetSmart Android APK
    max_build_duration: 60
    environment:
      node: 24
      groups:
        - expo_credentials
      vars:
        EXPO_PROJECT_DIR: artifacts/mobile
        COREPACK_ENABLE_STRICT: "0"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Configuration de pnpm (Corepack)
        script: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Installation des dépendances
        script: |
          pnpm install --no-frozen-lockfile

      - name: Installation de EAS CLI
        script: |
          npm install -g eas-cli

      - name: Vérification authentification
        script: |
          cd $EXPO_PROJECT_DIR
          eas whoami

      - name: Build de l'APK via EAS
        script: |
          cd $EXPO_PROJECT_DIR
          eas build --platform android --profile preview --non-interactive

    artifacts:
      - artifacts/mobile/**/*.apk
      - artifacts/mobile/**/*.aab

  android-local-build:
    name: BudgetSmart Android (Local Export)
    max_build_duration: 60
    environment:
      node: 24
      vars:
        EXPO_PROJECT_DIR: artifacts/mobile
        COREPACK_ENABLE_STRICT: "0"
    scripts:
      - name: Enable pnpm
        script: |
          corepack enable
          corepack prepare pnpm@latest --activate
      - name: Install dependencies
        script: |
          pnpm install --no-frozen-lockfile
      - name: Export Web Bundle
        script: |
          cd $EXPO_PROJECT_DIR
          pnpm expo export --platform web --output-dir dist
    artifacts:
      - artifacts/mobile/dist/**
