workflows:
  android-apk:
    name: BudgetSmart — Android APK
    max_build_duration: 90
    environment:
      node: latest
      java: 17
      vars:
        EXPO_PROJECT_DIR: artifacts/mobile
        COREPACK_ENABLE_STRICT: "0"
        NODE_ENV: production
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Activer pnpm
        script: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm --version

      - name: Installer les dépendances
        script: |
          pnpm install --no-frozen-lockfile

      - name: Générer le projet Android natif (expo prebuild)
        script: |
          cd $EXPO_PROJECT_DIR
          npx expo prebuild --platform android --clean --no-install

      - name: Rendre gradlew exécutable
        script: |
          chmod +x $EXPO_PROJECT_DIR/android/gradlew

      - name: Compiler l'APK de release
        script: |
          cd $EXPO_PROJECT_DIR/android
          ./gradlew assembleRelease \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g" \
            --no-daemon \
            --stacktrace

    artifacts:
      - artifacts/mobile/android/app/build/outputs/apk/release/*.apk
      - artifacts/mobile/android/app/build/outputs/apk/debug/*.apk
