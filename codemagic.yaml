# Configuration Codemagic pour BudgetSmart (Mobile-Budget-Sync)
workflows:
  android-release:
    name: BudgetSmart Android APK
    max_build_duration: 60
    environment:
      node: 24
      groups:
        - expo_credentials # Assure-toi d'avoir créé ce groupe dans l'UI Codemagic
      vars:
        EXPO_PROJECT_DIR: artifacts/mobile
        COREPACK_ENABLE_STRICT: "0"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Configuration de pnpm (Corepack)
        script: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm --version

      - name: Installation des dépendances
        script: |
          # On utilise --ignore-scripts pour bypasser le message "Use pnpm instead" 
          # qui fait échouer le build à cause du script preinstall
          pnpm install --frozen-lockfile --ignore-scripts

      - name: Installation de EAS CLI
        script: |
          npm install -g eas-cli --force

      - name: Authentification Expo
        script: |
          cd $EXPO_PROJECT_DIR
          # Utilise les variables EXPO_TOKEN ou EXPO_APPLE_ID définies dans ton groupe de variables
          eas whoami || eas login --non-interactive

      - name: Build de l'APK via EAS
        script: |
          cd $EXPO_PROJECT_DIR
          # On lance le build en mode non-interactif
          eas build --platform android --profile preview --non-interactive --no-wait

    artifacts:
      - artifacts/mobile/**/*.apk
      - artifacts/mobile/**/*.aab

  android-local-build:
    name: BudgetSmart Android (Local Export)
    max_build_duration: 60
    environment:
      node: 24
      vars:
        EXPO_PROJECT_DIR: artifacts/mobile
        COREPACK_ENABLE_STRICT: "0"
    scripts:
      - name: Enable pnpm
        script: |
          corepack enable
          corepack prepare pnpm@latest --activate
      - name: Install dependencies
        script: |
          pnpm install --frozen-lockfile --ignore-scripts
      - name: Export Web Bundle (Optionnel)
        script: |
          cd $EXPO_PROJECT_DIR
          pnpm expo export --platform web --output-dir dist
    artifacts:
      - artifacts/mobile/dist/**