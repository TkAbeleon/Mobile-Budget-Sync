workflows:
  android-release:
    name: BudgetSmart Android APK
    max_build_duration: 60
    environment:
      node: 24
      groups:
        - expo_credentials
      vars:
        EXPO_PROJECT_DIR: artifacts/mobile
        COREPACK_ENABLE_STRICT: "0"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Enable pnpm via corepack
        script: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm --version
      - name: Install dependencies
        script: |
          pnpm install --frozen-lockfile
      - name: Install EAS CLI
        script: |
          npm install -g eas-cli --force
      - name: Expo login
        script: |
          cd $EXPO_PROJECT_DIR
          eas whoami || eas login --non-interactive
      - name: Build Android APK
        script: |
          cd $EXPO_PROJECT_DIR
          eas build --platform android --profile preview --non-interactive --no-wait
    artifacts:
      - artifacts/mobile/**/*.apk
      - artifacts/mobile/**/*.aab

  android-local-build:
    name: BudgetSmart Android (local Expo export)
    max_build_duration: 60
    environment:
      node: 24
      vars:
        EXPO_PROJECT_DIR: artifacts/mobile
        COREPACK_ENABLE_STRICT: "0"
    scripts:
      - name: Enable pnpm via corepack
        script: |
          corepack enable
          corepack prepare pnpm@latest --activate
      - name: Install dependencies
        script: |
          pnpm install --frozen-lockfile
      - name: Export Expo web bundle
        script: |
          cd $EXPO_PROJECT_DIR
          pnpm expo export --platform web --output-dir dist
    artifacts:
      - artifacts/mobile/dist/**
